[tool.poetry]
name = "dealer-inventory-etl"
version = "0.1.0"
description = "Django service for dealer inventory ETL."
authors = ["Mykola GORBAN"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"
django = ">=5.0,<6.0"
psycopg = { version = ">=3.1,<4.0", extras = ["binary"] }

[tool.poetry.group.dev.dependencies]
black = "^26.5.1"
isort = "^8.0.1"
flake8 = "^7.3.0"

[tool.black]
line-length = 79
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 79

[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"
