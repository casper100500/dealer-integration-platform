services:
  web:
    image: web
    build: .
    command:
      - watchmedo
      - auto-restart
      - --directory=/code
      - "--pattern=*.py"
      - --recursive
      - --
      - python
      - manage.py
      - runserver
      - 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-development}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      POSTGRES_DB: ${POSTGRES_DB:-dealer_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-dealer_inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dealer_inventory}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - db
      - redis

  celery:
    build: .
    command:
      - celery
      - -A
      - config
      - worker
      - --loglevel=info
    volumes:
      - .:/code
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-development}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      POSTGRES_DB: ${POSTGRES_DB:-dealer_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-dealer_inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dealer_inventory}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - db
      - redis

  db:
    image: postgres:18.4-alpine
    volumes:
      - ./.postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dealer_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-dealer_inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dealer_inventory}
    ports:
      - "5432:5432"

  redis:
    image: redis:8.4-alpine
    ports:
      - "6379:6379"
